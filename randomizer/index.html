      function assertSnapshot(snapshot) {
        if (!snapshot || typeof snapshot !== "object") {

        }
        if (!Number.isInteger(snapshot.m) || snapshot.m < 1 || snapshot.m > n) {
          throw new RangeError("复演取签数无效。");
        }

        const ids = new Set();
        const labels = new Set();
        const options = snapshot.options.map((option, index) => {
          if (
            !option ||
            !Number.isInteger(option.id) ||
            typeof option.label !== "string"
          ) {
            throw new TypeError("复演候选签格式无效。");
          }
          const label = normalizeLabel(option.label);
          if (!label || label !== option.label || ids.has(option.id) || labels.has(label)) {
            throw new Error("复演候选签包含空项、重复项或未规范化文字。");
          }
          ids.add(option.id);
          labels.add(label);
          return { id: option.id, label, order: index };
        });

        return {
          question: normalizeLabel(snapshot.question),

      function bytesToHex(bytes) {
        return Array.from(
          bytes,
          (byte) => byte.toString(16).padStart(2, "0")
        ).join("");
      }

      function hexToBytes(seedHex) {
        const clean = seedHex.trim().toLowerCase();
        if (!/^[0-9a-f]{64}$/.test(clean)) {
          throw new Error("种子必须是 64 位十六进制。");
        }
        return new Uint8Array(
          clean.match(/.{2}/g).map((pair) => Number.parseInt(pair, 16))
        );
      }

      function utf8Encode(source) {
        const bytes = [];
        for (const symbol of source) {
          let codePoint = symbol.codePointAt(0);
          if (codePoint >= 0xd800 && codePoint <= 0xdfff) codePoint = 0xfffd;
          if (codePoint <= 0x7f) {
            bytes.push(codePoint);
          } else if (codePoint <= 0x7ff) {
            bytes.push(
              0xc0 | (codePoint >>> 6),
              0x80 | (codePoint & 0x3f)
            );
          } else if (codePoint <= 0xffff) {
            bytes.push(
              0xe0 | (codePoint >>> 12),
              0x80 | ((codePoint >>> 6) & 0x3f),
              0x80 | (codePoint & 0x3f)
            );
          } else {
            bytes.push(
              0xf0 | (codePoint >>> 18),
              0x80 | ((codePoint >>> 12) & 0x3f),
              0x80 | ((codePoint >>> 6) & 0x3f),
              0x80 | (codePoint & 0x3f)
            );
          }
        }
        return new Uint8Array(bytes);
      }

      const SHA256_K = new Uint32Array([
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
        0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
        0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc,
        0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7,
        0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
        0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3,
        0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5,
        0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
        0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ]);
      let cryptoPrimitivesChecked = false;

      function rotateRight(value, shift) {
        return ((value >>> shift) | (value << (32 - shift))) >>> 0;
      }

      function concatBytes(...arrays) {
        const length = arrays.reduce((sum, array) => sum + array.length, 0);
        const output = new Uint8Array(length);
        let offset = 0;
        arrays.forEach((array) => {
          output.set(array, offset);
          offset += array.length;
        });
        return output;
      }

      function sha256(bytes) {
        const length = bytes.length;
        const paddedLength = Math.ceil((length + 9) / 64) * 64;
        const padded = new Uint8Array(paddedLength);
        padded.set(bytes);
        padded[length] = 0x80;
        const bitLengthHigh = Math.floor(length / 0x20000000);
        const bitLengthLow = (length << 3) >>> 0;
        const paddedView = new DataView(padded.buffer);
        paddedView.setUint32(paddedLength - 8, bitLengthHigh, false);
        paddedView.setUint32(paddedLength - 4, bitLengthLow, false);

        const state = new Uint32Array([
          0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
          0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
        ]);
        const schedule = new Uint32Array(64);

        for (let chunk = 0; chunk < paddedLength; chunk += 64) {
          for (let index = 0; index < 16; index += 1) {
            schedule[index] = paddedView.getUint32(chunk + index * 4, false);
          }
          for (let index = 16; index < 64; index += 1) {
            const x = schedule[index - 15];
            const y = schedule[index - 2];
            const sigma0 =
              rotateRight(x, 7) ^ rotateRight(x, 18) ^ (x >>> 3);
            const sigma1 =
              rotateRight(y, 17) ^ rotateRight(y, 19) ^ (y >>> 10);
            schedule[index] = (
              schedule[index - 16] +
              sigma0 +
              schedule[index - 7] +
              sigma1
            ) >>> 0;
          }

          let a = state[0];
          let b = state[1];
          let c = state[2];
          let d = state[3];
          let e = state[4];
          let f = state[5];
          let g = state[6];
          let h = state[7];

          for (let index = 0; index < 64; index += 1) {
            const sum1 =
              rotateRight(e, 6) ^ rotateRight(e, 11) ^ rotateRight(e, 25);
            const choose = (e & f) ^ (~e & g);
            const temp1 = (
              h + sum1 + choose + SHA256_K[index] + schedule[index]
            ) >>> 0;
            const sum0 =
              rotateRight(a, 2) ^ rotateRight(a, 13) ^ rotateRight(a, 22);
            const majority = (a & b) ^ (a & c) ^ (b & c);
            const temp2 = (sum0 + majority) >>> 0;
            h = g;
            g = f;
            f = e;
            e = (d + temp1) >>> 0;
            d = c;
            c = b;
            b = a;
            a = (temp1 + temp2) >>> 0;
          }

          state[0] = (state[0] + a) >>> 0;
          state[1] = (state[1] + b) >>> 0;
          state[2] = (state[2] + c) >>> 0;
          state[3] = (state[3] + d) >>> 0;
          state[4] = (state[4] + e) >>> 0;
          state[5] = (state[5] + f) >>> 0;
          state[6] = (state[6] + g) >>> 0;
          state[7] = (state[7] + h) >>> 0;
        }

        const digest = new Uint8Array(32);
        const digestView = new DataView(digest.buffer);
        state.forEach((word, index) => {
          digestView.setUint32(index * 4, word, false);
        });
        return digest;
      }

      function hmacSha256(keyBytes, messageBytes) {
        let key = keyBytes;
        if (key.length > 64) key = sha256(key);
        const block = new Uint8Array(64);
        block.set(key);
        const innerPad = new Uint8Array(64);
        const outerPad = new Uint8Array(64);
        for (let index = 0; index < 64; index += 1) {
          innerPad[index] = block[index] ^ 0x36;
          outerPad[index] = block[index] ^ 0x5c;
        }
        const innerDigest = sha256(concatBytes(innerPad, messageBytes));
        return sha256(concatBytes(outerPad, innerDigest));
      }

      function ensureCryptoPrimitives() {
        if (cryptoPrimitivesChecked) return;
        const shaVector = bytesToHex(sha256(utf8Encode("abc")));
        const hmacVector = bytesToHex(
          hmacSha256(
            utf8Encode("key"),
            utf8Encode("The quick brown fox jumps over the lazy dog")
          )
        );
        if (
          shaVector !== "ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad" ||
          hmacVector !== "f7bc83f430538424b13298e6aa6fb143ef4d59a14946175997479dbc2d1a3cd8"
        ) {
          throw new Error("本地验签算法自检失败，本局不会继续。");
        }
        cryptoPrimitivesChecked = true;
      }

      function requireSecureRandom() {
        if (!globalThis.crypto?.getRandomValues) {
          throw new Error("当前环境无法提供安全随机数，本局不会降级抽取。");
        }
        ensureCryptoPrimitives();
      }

      function makeMasterSeed() {
        requireSecureRandom();
        const bytes = new Uint8Array(32);
        globalThis.crypto.getRandomValues(bytes);
        return {
          bytes,
          entropySource: "Web Crypto 256-bit 安全随机种子"
        };
      }

      async function createHmacStream(masterSeed, domain) {
        ensureCryptoPrimitives();
        const domainBytes = utf8Encode(domain);
        let counter = 0;
        let block = new Uint8Array(0);
        let offset = 0;

        async function refill() {
          const counterBytes = new Uint8Array(4);
          new DataView(counterBytes.buffer).setUint32(0, counter, false);
          counter += 1;
          const message = new Uint8Array(domainBytes.length + 1 + counterBytes.length);
          message.set(domainBytes, 0);
          message[domainBytes.length] = 0;
          message.set(counterBytes, domainBytes.length + 1);
          block = hmacSha256(masterSeed, message);
          offset = 0;
        }

        return {
          async nextUint32() {
            if (offset + 4 > block.length) await refill();
            const value = new DataView(
              block.buffer,
              block.byteOffset + offset,
              4
            ).getUint32(0, false);
            offset += 4;
            return value;
          }
        };
      }

      async function uniformInt(maxExclusive, stream) {
        if (!Number.isSafeInteger(maxExclusive) || maxExclusive < 1 || maxExclusive > UINT32_RANGE) {
          throw new RangeError("随机上界无效。");
        }
        const limit = Math.floor(UINT32_RANGE / maxExclusive) * maxExclusive;
        let value;
        do {
          value = await stream.nextUint32();
        } while (value >= limit);
        return value % maxExclusive;
      }

      async function castHexagram(masterSeed) {
        const stream = await createHmacStream(masterSeed, "divination/v1");
        const lines = [];
        let primaryCode = 0;
        let changedCode = 0;
        let movingMask = 0;

        for (let index = 0; index < 6; index += 1) {
          const coinBits = await uniformInt(8, stream);
          const value = 6 + POPCOUNT3[coinBits];
          const primaryYang = value === 7 || value === 9;
          const moving = value === 6 || value === 9;
          const changedYang = moving ? !primaryYang : primaryYang;

          if (primaryYang) primaryCode |= 1 << index;
          if (moving) movingMask |= 1 << index;
          if (changedYang) changedCode |= 1 << index;

          lines.push({
            position: index + 1,
            value,
            primaryYang,
            moving,
            changedYang
          });
        }

        return {
          lines,
          primaryCode,
          changedCode,
          movingMask,
          primaryLower: primaryCode & 7,
          primaryUpper: (primaryCode >>> 3) & 7,
          changedLower: changedCode & 7,
          changedUpper: (changedCode >>> 3) & 7
        };
      }

      function mix32(value) {
        let x = value >>> 0;
        x = (x ^ (x >>> 16)) >>> 0;
        x = Math.imul(x, 0x7feb352d) >>> 0;
        x = (x ^ (x >>> 15)) >>> 0;
        x = Math.imul(x, 0x846ca68b) >>> 0;
        return (x ^ (x >>> 16)) >>> 0;
      }

      function gcd(a, b) {
        let x = a;
        let y = b;
        while (y !== 0) {
          const next = x % y;
          x = y;
          y = next;
        }
        return x;
      }

      function bitCount(value) {
        let count = 0;
        let x = value >>> 0;
        while (x) {
          x &= x - 1;
          count += 1;
        }
        return count;
      }

      function guaKey(oracle) {
        return (
          oracle.primaryCode |
          (oracle.changedCode << 6) |
          (oracle.movingMask << 12)
        ) >>> 0;
      }

      function deriveAffineTransform(n, oracle) {
        const key = guaKey(oracle);
        if (n === 1) return { a: 0, b: 0, key, reversed: false };

        let a = 1 + (mix32(key ^ 0xa5a5a5a5) % (n - 1));
        while (gcd(a, n) !== 1) {
          a += 1;
          if (a === n) a = 1;
        }
        const reversed = (bitCount(oracle.movingMask) & 1) === 1;
        if (reversed) a = n - a;
        const b = mix32(key ^ 0x3c6ef372) % n;
        return { a, b, key, reversed };
      }

      async function selectOptions(masterSeed, options, m, oracle) {
        const stream = await createHmacStream(masterSeed, "selection/v1");
        const n = options.length;
        const transform = deriveAffineTransform(n, oracle);
        const pool = Array.from(
          { length: n },
          (_, index) => n === 1 ? 0 : (transform.a * index + transform.b) % n
        );
        const swapOffsets = [];

        for (let index = 0; index < m; index += 1) {
          const span = n - index;
          const offset = await uniformInt(span, stream);
          const swapIndex = index + offset;
          [pool[index], pool[swapIndex]] = [pool[swapIndex], pool[index]];
          swapOffsets.push(offset);
        }

        const selectedIndices = pool.slice(0, m);
        return {
          transform,
          swapOffsets,
          selectedIndices,
          selected: selectedIndices.map((index) => options[index])
        };
      }

      async function computeDraw(masterSeed, snapshot) {
        const checked = assertSnapshot(snapshot);
        const oracle = await castHexagram(masterSeed);
        const selection = await selectOptions(
          masterSeed,
          checked.options,
          checked.m,
          oracle
        );
        return { oracle, ...selection };
      }

      async function optionListDigest(snapshot) {
        const canonical = JSON.stringify(
          snapshot.options.map((option) => ({
            id: option.id,
            label: option.label
          }))
        );
        return bytesToHex(await sha256(utf8Encode(canonical)));
      }

      async function createDraw(snapshot) {
        const checked = assertSnapshot(snapshot);
        const seedInfo = makeMasterSeed();
        const masterSeed = seedInfo.bytes;
        const computed = await computeDraw(masterSeed, checked);
        const optionDigest = await optionListDigest(checked);
        const seedHex = bytesToHex(masterSeed);
        const createdAt = new Date();
        const drawId =
          `${seedHex.slice(0, 4)}-${seedHex.slice(4, 8)}-${seedHex.slice(8, 12)}`.toUpperCase();
        const payloadObject = {
          version: "liuyao-fair-v1",
          seed: seedHex,
          drawId,
          createdAt: createdAt.toISOString(),
          question: checked.question,
          options: checked.options.map((option) => ({
            id: option.id,
            label: option.label
          })),
          m: checked.m,
          optionDigest,
          oracle: {
            primaryCode: computed.oracle.primaryCode,
            changedCode: computed.oracle.changedCode,
            movingMask: computed.oracle.movingMask
          },
          transform: {
            a: computed.transform.a,
            b: computed.transform.b,
            reversed: computed.transform.reversed
          },
          selectedIndices: computed.selectedIndices.slice()
        };
        const receiptPayloadText = JSON.stringify(payloadObject);
        const receiptDigestHex = bytesToHex(
          await sha256(utf8Encode(receiptPayloadText))
        );

        return {
          algorithmVersion: "liuyao-fair-v1",
          masterSeed,
          seedHex,
          entropySource: seedInfo.entropySource,
          drawId,
          optionDigest,
          receiptPayload: receiptPayloadText,
          receiptDigest: receiptDigestHex,
          createdAt,
          ...computed
        };
      }

      function buildEmptyYaoStack(container) {
        container.replaceChildren();
        for (let index = 0; index < 6; index += 1) {

          segment.className = "mystic-yao-segment";
          line.append(segment);
          container.append(line);
        }
      }

      function drawYaoLine(element, line) {
        element.replaceChildren();
        const segmentCount = line.primaryYang ? 1 : 2;
        for (let index = 0; index < segmentCount; index += 1) {
          const segment = document.createElement("span");
          segment.className = "mystic-yao-segment";
          element.append(segment);
        }
        element.classList.toggle("is-moving", line.moving);
        element.classList.add("is-drawn");
        if (line.moving) {
          const mark = document.createElement("span");
          mark.className = "mystic-moving-mark text-small";
          mark.textContent = "动";
          element.append(mark);
        }
      }

      function renderCompleteYao(container, lines) {
        buildEmptyYaoStack(container);
        const elements = Array.from(container.querySelectorAll(".mystic-yao-line"));
        lines.forEach((line, index) => drawYaoLine(elements[index], line));
      }

      function delay(milliseconds) {
        return new Promise((resolve) => setTimeout(resolve, milliseconds));
      }

      async function animateOracle(draw) {
        buildEmptyYaoStack(ritualYaoStack);
        const elements = Array.from(ritualYaoStack.querySelectorAll(".mystic-yao-line"));
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const stepDelay = reducedMotion ? 0 : 250;
        oracleDisc.classList.add("is-casting");

        for (let index = 0; index < draw.oracle.lines.length; index += 1) {
          if (stepDelay) await delay(stepDelay);
          const line = draw.oracle.lines[index];
          drawYaoLine(elements[index], line);
          oracleStatus.textContent = `${linePositions[index]}爻已生 · ${index + 1} / 6`;
        }

        oracleDisc.setAttribute(
          "aria-label",
          `六爻已成，爻值自下而上为 ${draw.oracle.lines.map((line) => line.value).join("、")}`
        );
        oracleStatus.textContent = "六爻已成，正在落签。";
        if (!reducedMotion) await delay(420);
        oracleDisc.classList.remove("is-casting");
      }

      function probabilityText(m, n) {
        const percentage = (m / n) * 100;
        const formatted = Number.isInteger(percentage)
          ? percentage.toFixed(0)
          : percentage.toFixed(1);
        return `每项 ${m}/${n} · ${formatted}%`;
      }

      function movingLineText(oracle) {
        const moving = oracle.lines
          .filter((line) => line.moving)
          .map((line) => linePositions[line.position - 1]);
        if (moving.length === 0) return "六爻皆静";
        return `${moving.join("、")}爻动`;
      }

      function renderCompanions(selected) {
        companions.replaceChildren();
        if (selected.length <= 1) {
          companions.hidden = true;
          return;
        }
        companions.hidden = false;
        selected.slice(1).forEach((option, index) => {
          const row = document.createElement("div");
          row.className = "mystic-result-row";
          const rank = document.createElement("span");
          rank.className = "mystic-result-rank text-small";
          rank.textContent = `伴签 ${index + 1}`;
          const label = document.createElement("span");
          label.className = "mystic-result-label";
          label.textContent = option.label;
          row.append(rank, label);
          companions.append(row);
        });
      }

      function renderResult(draw) {
        const oracle = draw.oracle;
        const lower = trigrams[oracle.primaryLower];
        const upper = trigrams[oracle.primaryUpper];
        const changedLower = trigrams[oracle.changedLower];
        const changedUpper = trigrams[oracle.changedUpper];

        renderCompleteYao(resultYao, oracle.lines);
        resultYao.setAttribute(
          "aria-label",
          `本局六爻，自下而上为 ${oracle.lines.map((line) => line.value).join("、")}`
        );
        hexName.textContent = `${upper.glyph} ${upper.name}${upper.nature}在上 · ${lower.glyph} ${lower.name}${lower.nature}在下`;
        hexChange.textContent = `${movingLineText(oracle)} · 变为${changedUpper.name}上${changedLower.name}下`;
        primaryResult.textContent = draw.selected[0].label;
        resultQuestion.textContent = sealed.question || "此局不立题，只凭当下一念。";
        renderCompanions(draw.selected);

        interpretation.textContent =
          `象意取「${lower.counsel}，${upper.counsel}」。签既已成，宜少作反复。`;

        probabilityBadge.textContent = probabilityText(sealed.m, sealed.options.length);
        receiptTime.textContent = new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "medium",
          timeStyle: "medium"
        }).format(draw.createdAt);
        receiptProbability.textContent =
          `${probabilityText(sealed.m, sealed.options.length)}，等概率、无放回`;
        receiptEntropy.textContent = draw.entropySource;
        receiptTransform.textContent =
          `P(i)=(${draw.transform.a}×i+${draw.transform.b}) mod ${sealed.options.length} · ${draw.transform.reversed ? "逆行" : "顺行"}`;
        receiptId.textContent = draw.drawId;
        receiptOptions.textContent = draw.optionDigest;
        receiptSeed.textContent = draw.seedHex;
        receiptDigest.textContent = draw.receiptDigest;
        receiptPayload.textContent = draw.receiptPayload;
        verifyStatus.textContent = "";
        receipt.open = false;
        acceptedBadge.hidden = true;
        acceptButton.disabled = false;
        acceptButton.textContent = "就依此签";
      }

      async function startCast() {
        if (!sealed || castButton.disabled) return;
        castButton.disabled = true;
        backInputButton.disabled = true;
        oracleStatus.textContent = "正在取数起卦。";

        try {
          currentDraw = await createDraw(sealed);
          await animateOracle(currentDraw);
          renderResult(currentDraw);
          showView("result");
          acceptButton.focus();
        } catch (error) {
          oracleStatus.textContent = error instanceof Error
            ? error.message
            : "起卦未成，请稍后重试。";
        } finally {
          castButton.disabled = false;
          backInputButton.disabled = false;
        }
      }

      function sealCurrentInput() {
        try {
          const snapshot = validateInput();
          if (!snapshot) return;

          sealed = {
            question: snapshot.question,
            options: snapshot.options.map((option) => ({ ...option })),
            m: snapshot.m
          };
          currentDraw = null;
          ritualMeta.textContent = `${sealed.options.length} 项取 ${sealed.m} 项`;
          questionSummary.textContent = sealed.question || "未立题 · 只问当下一念";
          oracleStatus.textContent = "静一息，再以当下一念起卦。";
          oracleDisc.setAttribute("aria-label", "尚未起卦的六爻盘");
          buildEmptyYaoStack(ritualYaoStack);
          showView("ritual");
          castButton.focus();
        } catch (error) {
          errorEl.textContent = error instanceof Error
            ? `封签未成：${error.message}`
            : "封签未成，请检查输入。";
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        sealCurrentInput();
      });
      sealButton.addEventListener("click", (event) => {
        event.preventDefault();
        sealCurrentInput();
      });

      optionsInput.addEventListener("input", () => {
        updateOptionCount();
        autoGrowOptions();
        clearInputError();
      });
      countInput.addEventListener("input", clearInputError);
      questionInput.addEventListener("input", clearInputError);

      castButton.addEventListener("click", startCast);

      backInputButton.addEventListener("click", () => {
        showView("input");
        autoGrowOptions();
        optionsInput.focus();
      });

      acceptButton.addEventListener("click", () => {
        acceptedBadge.hidden = false;
        acceptButton.disabled = true;
        acceptButton.textContent = "已依此签";
      });

      redrawButton.addEventListener("click", () => {
        if (!sealed) return;
        currentDraw = null;
        oracleStatus.textContent = "新局已封，静一息再起卦。";
        oracleDisc.setAttribute("aria-label", "尚未起卦的六爻盘");
        buildEmptyYaoStack(ritualYaoStack);
        showView("ritual");
        castButton.focus();
      });

      editButton.addEventListener("click", () => {
        showView("input");
        autoGrowOptions();
        optionsInput.focus();
      });

      globalThis.addEventListener?.("resize", () => {
        const inputView = views.find((view) => view.dataset.view === "input");
        if (inputView && !inputView.hidden) autoGrowOptions();
      });

      verifyButton.addEventListener("click", async () => {
        if (!receiptPayload.textContent) return;
        verifyButton.disabled = true;
        verifyStatus.classList.remove("text-destructive");
        verifyStatus.textContent = "正在按签证载荷复演。";
        try {
          const payloadText = receiptPayload.textContent;
          const payload = JSON.parse(payloadText);
          if (
            payload.version !== "liuyao-fair-v1" ||
            !payload.oracle ||
            !payload.transform ||
            !Array.isArray(payload.selectedIndices)
          ) {
            throw new Error("签证格式无效。");
          }

          const snapshot = assertSnapshot({
            question: payload.question,
            options: payload.options,
            m: payload.m
          });
          const masterSeed = hexToBytes(payload.seed);
          const replay = await computeDraw(masterSeed, snapshot);
          const computedPayloadDigest = bytesToHex(
            await sha256(utf8Encode(payloadText))
          );
          const computedOptionDigest = await optionListDigest(snapshot);
          const computedDrawId =
            `${payload.seed.slice(0, 4)}-${payload.seed.slice(4, 8)}-${payload.seed.slice(8, 12)}`.toUpperCase();
          const expectedTransformText =
            `P(i)=(${replay.transform.a}×i+${replay.transform.b}) mod ${snapshot.options.length} · ${replay.transform.reversed ? "逆行" : "顺行"}`;
          const displayedResults = [
            primaryResult.textContent,
            ...Array.from(
              companions.querySelectorAll(".mystic-result-label"),
              (node) => node.textContent
            )
          ];
          const replayResults = replay.selected.map((option) => option.label);
          const sameArray = (left, right) =>
            Array.isArray(left) &&
            Array.isArray(right) &&
            left.length === right.length &&
            left.every((value, index) => value === right[index]);

          const isValid =
            receiptDigest.textContent.trim() === computedPayloadDigest &&
            receiptSeed.textContent.trim() === payload.seed &&
            receiptOptions.textContent.trim() === computedOptionDigest &&
            receiptId.textContent.trim() === computedDrawId &&
            receiptTransform.textContent.trim() === expectedTransformText &&
            payload.drawId === computedDrawId &&
            payload.optionDigest === computedOptionDigest &&
            payload.oracle.primaryCode === replay.oracle.primaryCode &&
            payload.oracle.changedCode === replay.oracle.changedCode &&
            payload.oracle.movingMask === replay.oracle.movingMask &&
            payload.transform.a === replay.transform.a &&
            payload.transform.b === replay.transform.b &&
            payload.transform.reversed === replay.transform.reversed &&
            sameArray(payload.selectedIndices, replay.selectedIndices) &&
            sameArray(displayedResults, replayResults);

          if (!isValid) throw new Error("签证内容与复演结果不一致。");
          verifyStatus.textContent = "复验一致：名单、卦码、卦钥与选中序列均匹配。";
        } catch (error) {
          verifyStatus.classList.add("text-destructive");
          verifyStatus.textContent = "复验不一致：签证内容可能已改变。";
        } finally {
          verifyButton.disabled = false;
        }
      });

      updateOptionCount();
      autoGrowOptions();
      buildEmptyYaoStack(ritualYaoStack);

      root.__mysticRandomizer = {
        computeDraw,
        deriveAffineTransform,
        bytesToHex,
        async drawFromSeedHex(seedHex, snapshot) {
          const checked = assertSnapshot(snapshot);
          return computeDraw(hexToBytes(seedHex), checked);
        }
      };
    })();
  </script>
</div>

</body>
</html>
